<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | TecnoSolutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="index.html" class="logo" style="text-decoration:none"><i class="fas fa-laptop-code"></i> TecnoSolutions</a>
        </div>
    </header>

    <div class="container section-padding" style="max-width: 600px;">
        <div class="comment-form-card">
            <h2 style="text-align:center; margin-bottom: 20px;">Mi Cuenta</h2>
            <form onsubmit="alert('Datos actualizados'); return false;">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="prof-name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="prof-email">
                </div>
                <button type="submit" class="btn-submit" style="background: var(--primary);">Guardar Cambios</button>
                <button type="button" onclick="logout()" class="btn-submit" style="background: #ef4444; margin-top: 10px;">Cerrar Sesión</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Cargar datos del perfil
        const user = JSON.parse(localStorage.getItem('userSession'));
        if(user) {
            document.getElementById('prof-name').value = user.name;
            document.getElementById('prof-email').value = user.email;
        } else {
            location.href = 'index.html';
        }
    </script>
</body>
</html>
