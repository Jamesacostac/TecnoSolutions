<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | TecnoSolutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-alt">
    <div class="container section-padding">
        <div class="auth-card">
            <h2 class="center-text">Crear Cuenta</h2>
            <form onsubmit="handleRegistration(event)">
                <div style="margin-bottom:20px">
                    <label>Nombre completo</label>
                    <input type="text" id="reg-name" class="form-input" required placeholder="Ej. Juan Pérez">
                </div>
                <button type="submit" class="btn-submit-pro">Registrarse</button>
            </form>
            <p class="center-text" style="margin-top:20px"><a href="index.html">Volver</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
