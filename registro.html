<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso | TecnoSolutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="container section-padding">
        <div class="comment-form-card" style="max-width: 400px; margin: auto;">
            <h2 class="center-text">Crear Cuenta</h2>
            <form onsubmit="handleRegistration(event)">
                <input type="text" id="reg-name" placeholder="Nombre completo" class="form-input" required>
                <input type="email" id="reg-email" placeholder="Correo electrónico" class="form-input" required>
                <button type="submit" class="btn-submit">Registrarse e Ingresar</button>
            </form>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
