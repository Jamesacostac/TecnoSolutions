<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso | TecnoSolutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>Crear Cuenta</h2>
            <p>Únete a nuestra comunidad técnica</p>
            <form onsubmit="handleRegistration(event)">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                </div>
                <button type="submit" class="btn-submit">Registrarse Ahora</button>
            </form>
            <p style="margin-top:20px; font-size: 0.9rem;">¿Ya tienes cuenta? <a href="#" style="color: var(--primary);">Inicia Sesión</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
