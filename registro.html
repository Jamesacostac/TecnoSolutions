<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - TecnoSolutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>...</header> <section class="container" style="padding: 50px 0;">
        <div id="auth-section" class="contact-form" style="max-width: 400px; margin: auto;">
            <h2>Registro / Login</h2>
            <form id="loginForm">
                <input type="text" id="reg-name" placeholder="Nombre" required>
                <input type="email" id="reg-email" placeholder="Correo" required>
                <input type="password" placeholder="Contraseña" required>
                <button type="submit" class="btn-orange" style="width:100%">Entrar</button>
            </form>
        </div>

        <div id="profile-section" class="hidden" style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px;">
            <div class="service-card">
                <img id="profile-img" src="https://via.placeholder.com/150" style="width:150px; height:150px; border-radius:50%; object-fit:cover;">
                <input type="file" id="img-upload" style="display:none">
                <button onclick="document.getElementById('img-upload').click()" class="btn-orange">Cambiar Foto</button>
                <h3 id="user-display-name">Usuario</h3>
                <button onclick="logout()" class="btn-orange" style="background:#666">Salir</button>
            </div>
            <div class="service-card">
                <h3>Actualizar Datos</h3>
                <input type="email" id="update-email" placeholder="Nuevo Correo">
                <input type="password" placeholder="Nueva Contraseña">
                <button class="btn-orange">Guardar Cambios</button>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
