<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | TecnoSolutions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-alt">
    <div class="container section-padding">
        <div class="auth-card">
            <h2 class="center-text">Bienvenido</h2>
            <p class="center-text">Regístrate para guardar tus tutoriales favoritos.</p>
            <form onsubmit="handleRegistration(event)">
                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="reg-name" class="form-input" placeholder="Tu nombre..." required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" class="form-input" placeholder="******" required>
                </div>
                <button type="submit" class="btn-submit-pro">Entrar / Registrarse</button>
            </form>
            <p class="center-text" style="margin-top:15px"><a href="index.html">Volver al inicio</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
